name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        # The test suite is stdlib + pytest only (no Playwright / rank-bm25
        # needed — core.py is pure stdlib). Keep CI lean and fast.
        run: python -m pip install --upgrade pip pytest

      - name: Run test suite
        run: python -m pytest tests/ -q

  catalogue-drift:
    name: getdesign catalogue drift check
    runs-on: ubuntu-latest
    # Non-blocking: getdesign is an external npx package; a network hiccup or an
    # upstream catalogue change should surface as a visible warning, not a red
    # build that blocks unrelated PRs.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node (for npx getdesign)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check data/getdesign-references.csv against the live catalogue
        # Exits 1 on drift; continue-on-error keeps it advisory. Re-sync locally
        # with: python scripts/sync_references.py --update
        run: python scripts/sync_references.py --check
